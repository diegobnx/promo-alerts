name: "Promo Monitor — Brasil → Itália 🇮🇹"

on:
  schedule:
    # Seg-Sex: 08h, 13h, 18h, 22h (horário Brasília = UTC-3)
    - cron: '0 11,16,21 * * 1-5'
    # Sáb-Dom: 10h e 18h
    - cron: '0 13,21 * * 0,6'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor-and-notify:
    runs-on: ubuntu-latest
    environment: TELEGRAM

    steps:
    - name: "Checkout repository"
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: "Setup Python"
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: app/requirements.txt

    - name: "Install dependencies"
      run: pip install -r app/requirements.txt

    - name: "Monitor RSS feeds"
      id: monitor
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        cd app
        python main.py 2>&1 | tee rss_monitor.log
        echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

    - name: "Save data and commit"
      if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Actions"

        git add data/ || true

        if ! git diff --staged --quiet; then
          git commit -m "chore: update monitoring data — $(date '+%Y-%m-%d %H:%M UTC')"
          git push
          echo "✅ Dados atualizados no repositório"
        else
          echo "ℹ️ Nenhuma mudança nos dados"
        fi

    - name: "Cleanup old price history"
      if: always()
      run: |
        find data/price_history/ -name "*.json" -mtime +30 -delete 2>/dev/null || true

    - name: "Execution summary"
      if: always()
      run: |
        echo "## 🇮🇹 Promo Alerts — Resumo" >> $GITHUB_STEP_SUMMARY
        echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Horário | $(date '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
        echo "| Rota | Brasil → Itália |" >> $GITHUB_STEP_SUMMARY
        if [ -f app/rss_monitor.log ]; then
          FOUND=$(grep "new posts total\|posts passed filters" app/rss_monitor.log | tail -1 || echo "—")
          echo "| Status | $FOUND |" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🔗 [Ver portal](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/portal/)" >> $GITHUB_STEP_SUMMARY

  # ── Publica o portal no GitHub Pages ─────────────────────────────────────
  deploy-portal:
    needs: monitor-and-notify
    runs-on: ubuntu-latest
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: "Checkout repository"
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}
        fetch-depth: 0

    - name: "Pull latest data"
      run: git pull origin ${{ github.ref_name }} || true

    - name: "Setup Pages"
      uses: actions/configure-pages@v5

    - name: "Upload Pages artifact"
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: "Deploy to GitHub Pages"
      id: deployment
      uses: actions/deploy-pages@v4
