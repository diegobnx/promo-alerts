# Configuração ESPECÍFICA: Passagens Brasil → ITÁLIA

enabled: true

# ROTAS - Desabilitado (usando apenas keywords)
routes:
  enabled: false

# PALAVRAS-CHAVE - FOCO: Itália + Passagens + Milhas
keywords:
  enabled: true
  include:
    # Lista vazia - lógica customizada no código para Itália + passagens + milhas
    []

  exclude:
    []

  # Termos relacionados a milhas
  miles_keywords:
    - "milhas"
    - "pontos"
    - "smiles"
    - "tudoazul"
    - "latam pass"
    - "lifemiles"
    - "tap miles"
    - "miles&more"
    - "prêmio"
    - "premio"
    - "programa de fidelidade"
    - "resgate"
    - "voo prêmio"
    - "passagem prêmio"
    - "promoção milhas"
    - "compre milhas"
    - "bonus milhas"
    - "oferta milhas"

# PREÇO - Para viagens internacionais Brasil → Itália
price:
  enabled: true
  domestic_max: 800
  international_max: 5500    # Máximo R$ 5.500 para Brasil-Itália (ida e volta)

  price_keywords:
    - "R$"
    - "reais"
    - "partir de"
    - "por"
    - "apenas"
    - "promoção"
    - "desconto"
    - "OFF"

# COMPANHIAS - Desabilitado
airlines:
  enabled: false

# CONFIGURAÇÕES
advanced:
  min_posts_to_notify: 1
  log_rejected_posts: false
  fuzzy_matching: true

  # Notificação quando não encontra promoções
  notify_when_no_results: true
  no_results_min_posts_analyzed: 10
